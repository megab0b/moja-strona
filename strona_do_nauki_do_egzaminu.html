<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Moja nauka</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    textarea {
      width: 90%;
      height: 100px;
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      background: #00bcd4;
      color: white;
      cursor: pointer;
    }

    .card {
      margin-top: 30px;
      padding: 20px;
      border-radius: 15px;
      background: #222;
      min-height: 100px;
    }
  </style>
</head>
<body>

  <h1>📚 Nauka do egzaminu</h1>

  <textarea id="input" placeholder="Wpisz informacje (np. pytanie - odpowiedź)"></textarea><br>
  <button onclick="addNote()">Dodaj</button>

  <div class="card" id="card">Brak danych</div>

  <button onclick="prev()">⬅️ Poprzednie</button>
  <button onclick="next()">➡️ Następne</button>
  <button onclick="toggle()">🔁 Odwróć</button>

  <script>
    let notes = [];
    let index = 0;
    let showAnswer = false;

    function addNote() {
      const input = document.getElementById('input').value;
      if (!input.includes('-')) {
        alert('Użyj formatu: pytanie - odpowiedź');
        return;
      }

      const parts = input.split('-');
      notes.push({
        q: parts[0].trim(),
        a: parts[1].trim()
      });

      document.getElementById('input').value = '';
      index = notes.length - 1;
      showAnswer = false;
      render();
    }

    function render() {
      if (notes.length === 0) {
        document.getElementById('card').innerText = 'Brak danych';
        return;
      }

      const note = notes[index];
      document.getElementById('card').innerText = showAnswer ? note.a : note.q;
    }

    function next() {
      if (notes.length === 0) return;
      index = (index + 1) % notes.length;
      showAnswer = false;
      render();
    }

    function prev() {
      if (notes.length === 0) return;
      index = (index - 1 + notes.length) % notes.length;
      showAnswer = false;
      render();
    }

    function toggle() {
      showAnswer = !showAnswer;
      render();
    }
  </script>

</body>
</html>
